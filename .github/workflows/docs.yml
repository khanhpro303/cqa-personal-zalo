name: Deploy Docs

on:
  push:
    branches: [main]
    paths: [docs/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and build
        working-directory: docs
        run: |
          npm ci
          npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check GitHub Pages status
        id: pages_status
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.get({ owner, repo });
            const enabled = Boolean(data.has_pages);
            core.setOutput("enabled", enabled ? "true" : "false");
            if (!enabled) {
              core.warning("Skipping docs deploy: GitHub Pages is not enabled for this repository.");
            }

      - id: deployment
        if: steps.pages_status.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4

      - name: Skip deploy summary
        if: steps.pages_status.outputs.enabled != 'true'
        run: |
          echo "Docs deploy skipped because GitHub Pages is not enabled."
